<!DOCTYPE html>
<html >
<head>
    <title>My Creative Canvas</title>
    <style>
        body {
            
            background-color: hsl(42, 31%, 94%); 
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            color: #5d4037;
            text-transform: uppercase;
            letter-spacing: 5px;
            border-bottom: 2px solid #d7ccc8;
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 50px;
        }
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        /* Polaroid Frame Effect */
        .polaroid {
            background: white;
            padding: 15px 15px 30px 15px; /* Niche zyada space caption ke liye */
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 1px solid #ddd;
            transition: transform 0.4s ease;
            cursor: pointer;
        }

        /* Different tilts for Pinterest vibe */
        .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:nth-child(even) { transform: rotate(3deg); }

        .polaroid:hover {
            transform:  scale(1.1); 
            z-index: 5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .polaroid img {
            width: 250px; /* Fixed width for discipline */
            height: 300px; /* Sab images ek size ki */
            object-fit: cover; /* Image kategi nahi, adjust ho jayegi */
            border: 1px solid #eee;
        }

        .caption {
            margin-top: 15px;
            font-family: 'Brush Script MT', cursive; /* Artistic font */
            font-size: 20px;
            color: #3e2723;
        }
    </style>
</head>
<body>

    <h1>My Creative Sanctuary</h1>

    <div class="gallery-container">
        
        <div class="polaroid">
            <img src="https://i.pinimg.com/736x/65/c8/07/65c80742cec913bb6ad9f4e423c896cb.jpg" alt="Mandala Art">
