<!DOCTYPE html>                                                                                                                                                                           <!DOCTYPE html>
<html>
<head>
  <title>THE FORBIDDEN ENTRY</title>
  <style>
    body {
        background: linear-gradient(145deg, lab(0% 0 0), #1a0033); 
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
        color: hsl(276, 100%, 85%); 
        padding: 40px 20px;
        margin: 0;
        min-height: 100vh;
    }
    H1{
    text-align: center;
        color: hsl(270, 100%, 60%);
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        text-transform: uppercase;
        letter-spacing: 15px;
        
        text-shadow: 2px 2px 15px hsl(270, 100%, 40%); 
        margin-bottom: 40px;} 

      h2 {
        text-align: center;
        color: #9933ff;
        text-transform: uppercase;
        letter-spacing: 6px;
        
        text-shadow: 2px 2px 15px #6600cc; 
        margin-bottom: 40px;
    }

    form {
        width: 50%;
        min-width: 350px;
        margin: auto;
        background: rgba(10, 0, 20, 0.9); 
        padding: 35px;
        border: 1px solid #4b0082;
        border-radius: 4px; 
        box-shadow: 0 0 25px rgba(75, 0, 130, 0.4);
    }

    label {
        display: block;
        margin-top: 20px;
        font-weight: bold;
        font-size: 13px;
        color: #b366ff;
    }

    input[type="text"], select, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        background: #05000a;
        border: 1px solid #4b0082;
        color: #e0b3ff;
        font-family: 'Consolas', monospace;
        outline: none;
        box-sizing: border-box;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #9933ff;
        box-shadow: 0 0 8px #6600cc;
    }


    .error {
        color: #ff3333;
        font-size: 11px;
        display: block;
        margin-top: 5px;
        font-weight: bold;
    }

    button {
        width: 100%;
        margin-top: 35px;
        background-color: #330066;
        color: #e0b3ff;
        padding: 12px;
        border: 1px solid #9933ff;
        font-family: 'Consolas', monospace;
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #4b0082;
        box-shadow: 0 0 15px #9933ff;
        letter-spacing: 2px; 
    }

   
    input[type="radio"], input[type="checkbox"] {
        accent-color: #9933ff;
    }
</style>
     

      
     
    
</head>
<body>
    <H1>DARK WEB</H1>
  <h2>THE FORBIDDEN ENTRY</h2>


  <form id="regForm" onsubmit="return validateForm()">
    <label>[THE_USER]:</label>
    <input type="text" id="name">
    <span class="error" id="nameError"></span>

    <label>[ACCESS_KEY](7-digit):</label>
    <input type="text" id="roll">
    <span class="error" id="rollError"></span>

    <label>Gender:</label>
    <input type="radio" name="gender" class="gender" value="Male"> Male
    <input type="radio" name="gender" class="gender" value="Female"> Female
    <span class="error" id="genderError"></span>

    <label>PICK YOUR SOUL:</label>
    <select id="course">
      <option value="">--WHO ARE YOU?--</option>
      <option value="BCA">THE CREATORS</option>
      <option value="B.Tech">THE WHISPERERS</option>
      <option value="B.Sc">THE SEEKERS</option>
      <option value="MBA">THE MASTERS</option>
    </select>
    <span class="error" id="courseError"></span>

    <label>Hobbies:</label>
    <input type="checkbox" class="hobbies" value="Reading"> DECODING SECRETS
    <input type="checkbox" class="hobbies" value="Music"> CAPTURING ECHOES
    <input type="checkbox" class="hobbies" value="Sports"> STALKING SHADOWS

    <label>[LAST_KNOWN_LOCATION]:</label>
    <textarea id="address" rows="3"></textarea>

    <label>
      <input type="checkbox" id="terms"> [NO_TURNING_BACK]
    </label>
    <span class="error" id="termsError"></span>

    <button type="submit">[ENTER_THE_VOID]</button>
  </form>

  <script>
    function validateForm() {
      let isValid = true;

      
      let name = document.getElementById("name").value;
      if (!/^[A-Za-z\s]+$/.test(name)) {
        document.getElementById("nameError").textContent = "Enter a valid name";
        isValid = false;
      } else {
        document.getElementById("nameError").textContent = "";
      }

     
      let roll = document.getElementById("roll").value;
      if (!/^\d{7}$/.test(roll)) {
        document.getElementById("rollError").textContent = "Roll number must be 7-digit";
        isValid = false;
      } else {
        document.getElementById("rollError").textContent = "";
      }

     
      let genderSelected = document.querySelector('input[name="gender"]:checked');
      if (!genderSelected) {
        document.getElementById("genderError").textContent = "Select your gender";
        isValid = false;
      } else {
        document.getElementById("genderError").textContent = "";
      }

    
      let course = document.getElementById("course").value;
      if (course === "") {
        document.getElementById("courseError").textContent = "Select your course";
        isValid = false;
      } else {
        document.getElementById("courseError").textContent = "";
      }

      
      if (!document.getElementById("terms").checked) {
        document.getElementById("termsError").textContent = "You must accept the terms";
        isValid = false;
      } else {
        document.getElementById("termsError").textContent = "";
      }

      return isValid;
    }
  </script>

</body>
</html>
